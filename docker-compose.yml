version: '3.8'

services:
  # Наш контейнер с базой данных PostgreSQL
  postgres-db:
    image: postgres:latest
    container_name: task-postgres-db
    environment:
      POSTGRES_DB: TaskFlow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/docker
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d TaskFlow"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - task-network

  # Наше Spring Boot приложение
  app-service:
    build: .
    container_name: TaskFlow
    ports:
      - "8080:8080"
    environment:
      # Передаем переменные, которые ожидает наш application.yml
      DB_HOST: postgres-db # Важно: имя хоста должно совпадать с именем сервиса БД выше!
      DB_PORT: 5432
      DB_NAME: TaskFlow
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
    depends_on:
      postgres-db:
        condition: service_healthy
    networks:
      - task-network

volumes:
  pgdata: # Чтобы данные в базе не удалялись при перезапуске контейнера

networks:
  task-network: # Общая сеть для контейнеров
